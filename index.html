<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugboat Urban Interiors</title>
    <meta name="description"
        content="Tugboat Urban Interiors: High-end, minimalist interior design and execution firm specializing in residential, commercial, and retail spaces.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Video Preloader -->
    <div id="video-preloader">
        <video id="intro-video" autoplay muted playsinline>
            <source src="TUGBOAT LOGO_INTRO1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Navbar -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="#home"><img src="logo 1.png" alt="Tugboat Logo"></a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-cta">
                <a href="contact.html" class="btn btn-outline">Let's Connect &rarr;</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero-section">
        <div class="video-container" id="video-container">
            <!-- Using architectural stock video loop -->
            <video autoplay muted loop playsinline id="hero-video">
                <source src="Video3.mp4" type="video/mp4">
            </video>
            <div id="video-btn" class="video-btn">
                <!-- Pause Icon (default) -->
                <svg id="pause-icon" viewBox="0 0 24 24" width="32" height="32">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
                <!-- Play Icon -->
                <svg id="play-icon" style="display: none;" viewBox="0 0 24 24" width="32" height="32">
                    <path fill="currentColor" d="M8 5v14l11-7z" />
                </svg>
            </div>
        </div>
    </header>

    <main>

        <!-- Scroll Animation Section -->
        <section id="scroll-sequence" class="scroll-sequence-section">
            <div class="canvas-container">
                <canvas id="scroll-canvas"></canvas>
            </div>
        </section>


        <!-- CTA Section -->
        <section id="contact" class="contact-section">
            <div class="contact-container reveal fade-bottom">
                <div class="contact-info">
                    <h2>Initiate a Dialogue.</h2>
                    <p>Let's define your next environment.</p>
                    <div class="social-links">
                        <a href="#"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
                            </svg>Instagram</a>
                        <a href="#"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                                <rect width="4" height="12" x="2" y="9" />
                                <circle cx="4" cy="4" r="2" />
                            </svg>LinkedIn</a>
                        <a href="#"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="currentColor">
                                <path
                                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z" />
                            </svg>WhatsApp</a>
                    </div>
                </div>
                <div class="contact-form-wrapper">
                    <form class="minimal-form">
                        <div class="form-group">
                            <input type="text" id="name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="inquiry" placeholder="Project Type (Residential, Commercial...)">
                        </div>
                        <div class="form-group">
                            <textarea id="message" rows="4" placeholder="Message Details" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Profile</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Tugboat Urban Interiors. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
